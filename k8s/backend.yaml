apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-backend
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-backend
  template:
    metadata:
      labels:
        app: go-backend
    spec:
      containers:
        - name: go-backend
          image: your-dockerhub/go-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_NAME
              value: todos
            - name: DB_PORT
              value: "5432"
            - name: DB_SSLMODE
              value: disable
---
apiVersion: v1
kind: Service
metadata:
  name: go-backend
  namespace: todo-app
spec:
  selector:
    app: go-backend
  ports:
    - port: 8080
      targetPort: 8080