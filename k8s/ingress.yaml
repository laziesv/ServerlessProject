apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  namespace: todo-app
  annotations:
    traefik.ingress.kubernetes.io/rule-type: PathPrefixStrip
spec:
  ingressClassName: traefik
  rules:
  - host: app.10.0.2.15.nip.io
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: go-backend
            port:
              number: 8080

      - path: /
        pathType: Prefix
        backend:
          service:
            name: next-frontend
            port:
              number: 3000