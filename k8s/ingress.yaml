apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  namespace: todo-app
spec:
  rules:
    - host: app.local
      http:
        paths:

          - path: /
            pathType: Prefix
            backend:
              service:
                name: next-frontend
                port:
                  number: 3000

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: go-backend
                port:
                  number: 8080